<!DOCTYPE html>
<html>
<head>
    <title>CKD Prediction</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f6f8;
            text-align: center;
        }

        .container {
            width: 400px;
            margin: auto;
            padding: 25px;
            background: white;
            border-radius: 12px;
            box-shadow: 0px 0px 15px rgba(0,0,0,0.1);
            margin-top: 40px;
        }

        h2 {
            margin-bottom: 20px;
        }

        input, select {
            width: 95%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            padding: 12px 25px;
            background: #007BFF;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 6px;
        }

        button:hover {
            background: #0056b3;
        }

        label {
            float: left;
            font-size: 14px;
            margin-top: 8px;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>CKD Prediction</h2>

    <form action="/predict" method="post">

        <label>Red Blood Cells</label>
        <select name="rbc">
            <option value="normal">Normal</option>
            <option value="abnormal">Abnormal</option>
        </select>

        <label>Pus Cell</label>
        <select name="pc">
            <option value="normal">Normal</option>
            <option value="abnormal">Abnormal</option>
        </select>

        <label>Blood Glucose Random</label>
        <input type="number" name="bgr" required>

        <label>Blood Urea</label>
        <input type="number" name="bu" required>

        <label>Pedal Edema</label>
        <select name="pe">
            <option value="yes">Yes</option>
            <option value="no">No</option>
        </select>

        <label>Anemia</label>
        <select name="ane">
            <option value="yes">Yes</option>
            <option value="no">No</option>
        </select>

        <label>Diabetes Mellitus</label>
        <select name="dm">
            <option value="yes">Yes</option>
            <option value="no">No</option>
        </select>

        <label>Coronary Artery Disease</label>
        <select name="cad">
            <option value="yes">Yes</option>
            <option value="no">No</option>
        </select>

        <br><br>
        <button type="submit">Predict</button>

    </form>
</div>

</body>
</html>
